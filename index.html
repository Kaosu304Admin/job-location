<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
:root{
  --brand-red:#c1121f;
  --brand-red-dark:#9b0f18;
  --brand-blue:#1d4ed8;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:14px}

.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin:14px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  gap:14px;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
}

/* ===== ITEM CARD ===== */
.item{
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  background:#fff;
  transition:.25s ease;
}
.item:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 45px rgba(0,0,0,.16);
}

/* body layout: left image + right info */
.item-body{
  display:flex;
  gap:14px;
  padding:14px;
}

.layout-left{
  width:160px;
  min-width:160px;
}
.layout-left img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:14px;
  cursor:pointer;
  display:block;
  box-shadow:0 10px 24px rgba(0,0,0,.10);
}

.info{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.tag{
  display:inline-block;
  padding:2px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:var(--brand-blue);
  font-size:12px;
  margin-right:6px;
}
.k{font-weight:700}

.meta-row{
  line-height:1.35;
}

/* ===== WI ACTION BAR (bottom) ===== */
.wi-bar{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--border);
  background:#fafafa;
}
.wi-bar button{
  flex:1;
  height:42px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:14px;
  background:var(--brand-red);
  color:#fff;
  transition:.15s ease;
}
.wi-bar button:hover{ background:var(--brand-red-dark); }
.wi-bar button.secondary{
  background:#eef2ff;
  color:var(--brand-blue);
  border:1px solid #c7d2fe;
}
.wi-bar button.secondary:hover{
  background:#e0e7ff;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;
  border-radius:16px;
  padding:10px;
  max-width:95vw;
  max-height:95vh;
}
.modal-content img{
  width:100%;
  max-height:90vh;
  object-fit:contain;
  display:block;
}

/* ===== Mobile ===== */
@media (max-width:640px){
  .grid{grid-template-columns:1fr}

  .item-body{
    gap:12px;
  }
  .layout-left{
    width:120px;
    min-width:120px;
  }
  .layout-left img{
    height:120px;
    border-radius:12px;
  }
  .wi-bar{
    flex-direction:column;
  }
  .wi-bar button{
    width:100%;
  }
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <b>ทดสอบการ์ดงาน (Layout ซ้าย + WI แถบล่าง)</b>
  <div id="list" class="grid" style="margin-top:12px"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg" alt="preview">
  </div>
</div>

<script>
// ===== DATA ตัวอย่าง (แทน API ก่อน) =====
// * เปลี่ยน layout_image_url ให้เป็น "รูปผังจริง" ของคุณ
const DATA = [
  {
    location_code:"A1-01",
    customer_code:"HONDA",
    part_name:"F5111/5112",

    // ✅ ใส่รูป Layout (ผัง) จริงตรงนี้
    // ตัวอย่างเป็น placeholder: ให้เปลี่ยนเป็น ID รูปผังของคุณ
    layout_image_url:"https://drive.google.com/thumbnail?id=1REPLACE_WITH_LAYOUT_IMAGE_ID&sz=w1200",

    // ✅ WI / Sticker
    wi_front_url:"https://drive.google.com/thumbnail?id=1YM-FyMyDJYoHs1-T8laNyvBl__8PWrSM&sz=w2000",
    wi_back_url:"https://drive.google.com/thumbnail?id=1L4wxNr5lyvqfAuKTZ7w6RgCkkyEvLWAs&sz=w2000",
    label_image_url:"https://drive.google.com/thumbnail?id=12EfYfvErhbsq114RSNONSbMKjIumuuyg&sz=w2000"
  }
];

function cardItem(it){
  const layout = it.layout_image_url || "";
  const wiFront = it.wi_front_url || "";
  const wiBack  = it.wi_back_url || "";
  const sticker = it.label_image_url || "";

  return `
    <div class="item">
      <div class="item-body">
        <div class="layout-left">
          <img src="${layout}" alt="layout" onclick="openModal('${layout}')">
        </div>

        <div class="info">
          <div class="meta-row"><span class="tag">ตำแหน่ง</span><span class="k">${it.location_code}</span></div>
          <div class="meta-row"><span class="tag">ลูกค้า</span>${it.customer_code}</div>
          <div class="meta-row"><span class="tag">งาน</span>${it.part_name}</div>
        </div>
      </div>

      <div class="wi-bar">
        <button onclick="event.stopPropagation(); openModal('${wiFront}')">WI หน้าเครื่อง</button>
        <button onclick="event.stopPropagation(); openModal('${wiBack}')">WI หลังเครื่อง</button>
        <button class="secondary" onclick="event.stopPropagation(); openModal('${sticker}')">สติ๊กเกอร์</button>
      </div>
    </div>
  `;
}

document.getElementById("list").innerHTML = DATA.map(cardItem).join("");

function openModal(src){
  if(!src) return;
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalImg").src = "";
}
</script>
</body>
</html>
