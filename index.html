<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
:root{
  --brand-red:#c1121f;
  --brand-red-dark:#9b0f18;
  --brand-blue:#1d4ed8;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:16px}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin:16px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* ===== WI CARD ===== */
.wi-card{
  border-radius:20px;
  padding:20px;
  background:#fff;
  box-shadow:0 18px 45px rgba(0,0,0,.14);
  transition:.25s ease;
}
.wi-card:hover{
  transform:translateY(-3px);
  box-shadow:0 24px 60px rgba(0,0,0,.2);
}

.wi-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}
.wi-title{font-size:22px;font-weight:800}
.wi-sub{font-size:12px;color:var(--muted)}

.wi-info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}
.wi-info span{font-size:12px;color:var(--muted)}
.wi-info b{font-size:16px}

.wi-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  height:44px;
  border-radius:12px;
  border:none;
  padding:0 16px;
  cursor:pointer;
  background:var(--brand-red);
  color:#fff;
  font-size:15px;
}
button.secondary{
  background:#eef2ff;
  color:var(--brand-blue);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;
  border-radius:16px;
  padding:10px;
  max-width:95vw;
  max-height:95vh;
}
.modal-content img{
  width:100%;
  max-height:90vh;
  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <h2>ทดสอบ WI 1 งาน</h2>

  <div class="wi-card">
    <div class="wi-header">
      <div class="wi-title">F5111/5112</div>
      <div class="wi-sub">Work Instruction</div>
    </div>

    <div class="wi-info">
      <div>
        <span>📦 แพ็คกิ้ง</span>
        <b>55x150G0</b>
      </div>
      <div>
        <span>🏷️ สีสติ๊กเกอร์</span>
        <b>สีฟ้า</b>
      </div>
    </div>

    <div class="wi-actions">
      <button onclick="openModal('https://drive.google.com/thumbnail?id=1YM-FyMyDJYoHs1-T8laNyvBl__8PWrSM&sz=w2000')">
        WI หน้าเครื่อง
      </button>
      <button onclick="openModal('https://drive.google.com/thumbnail?id=1L4wxNr5lyvqfAuKTZ7w6RgCkkyEvLWAs&sz=w2000')">
        WI หลังเครื่อง
      </button>
      <button class="secondary" onclick="openModal('https://drive.google.com/thumbnail?id=12EfYfvErhbsq114RSNONSbMKjIumuuyg&sz=w2000')">
        ดูสติ๊กเกอร์
      </button>
    </div>
  </div>

</div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">
  </div>
</div>

<script>
function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalImg").src = "";
}
</script>
</body>
</html>
