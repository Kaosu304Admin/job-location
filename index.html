<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
:root{
  --brand-red:#c1121f;
  --brand-red-dark:#9b0f18;
  --brand-blue:#1d4ed8;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:14px}

.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin:14px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
}

.item{
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  background:#fff;
  display:flex;
  gap:12px;
  cursor:pointer;
  transition:.2s ease;
}
.item:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 40px rgba(0,0,0,.14);
}

.info{flex:1}
.tag{
  display:inline-block;
  padding:2px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:var(--brand-blue);
  font-size:12px;
  margin-right:6px;
}
.k{font-weight:600}

/* ===== layout + WI ===== */
.thumb{
  width:140px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.thumb img{
  width:100%;
  max-height:90px;
  object-fit:cover;
  border-radius:10px;
}
.wi-btns{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.wi-btns button{
  height:36px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:var(--brand-red);
  color:#fff;
  font-size:13px;
}
.wi-btns button.secondary{
  background:#eef2ff;
  color:var(--brand-blue);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;
  border-radius:16px;
  padding:10px;
  max-width:95vw;
  max-height:95vh;
}
.modal-content img{
  width:100%;
  max-height:90vh;
  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <b>รายการงาน (ทดสอบรวม Layout + WI)</b>
  <div id="list" class="grid" style="margin-top:10px"></div>
</div>

</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">
  </div>
</div>

<script>
// ===== ตัวอย่างข้อมูล (แทน API ก่อน) =====
const DATA = [
  {
    location_code:"A1-01",
    customer_code:"HONDA",
    part_name:"F5111/5112",
    layout_image_url:"https://drive.google.com/thumbnail?id=1YM-FyMyDJYoHs1-T8laNyvBl__8PWrSM&sz=w1200",
    wi_front_url:"https://drive.google.com/thumbnail?id=1YM-FyMyDJYoHs1-T8laNyvBl__8PWrSM&sz=w2000",
    wi_back_url:"https://drive.google.com/thumbnail?id=1L4wxNr5lyvqfAuKTZ7w6RgCkkyEvLWAs&sz=w2000",
    label_image_url:"https://drive.google.com/thumbnail?id=12EfYfvErhbsq114RSNONSbMKjIumuuyg&sz=w2000"
  }
];

function cardItem(it){
  return `
    <div class="item" data-layout="${it.layout_image_url}">
      <div class="info">
        <div><span class="tag">ตำแหน่ง</span><span class="k">${it.location_code}</span></div>
        <div><span class="tag">ลูกค้า</span>${it.customer_code}</div>
        <div><span class="tag">งาน</span>${it.part_name}</div>
      </div>

      <div class="thumb">
        <img src="${it.layout_image_url}">
        <div class="wi-btns">
          <button onclick="event.stopPropagation(); openModal('${it.wi_front_url}')">WI หน้าเครื่อง</button>
          <button onclick="event.stopPropagation(); openModal('${it.wi_back_url}')">WI หลังเครื่อง</button>
          <button class="secondary" onclick="event.stopPropagation(); openModal('${it.label_image_url}')">สติ๊กเกอร์</button>
        </div>
      </div>
    </div>
  `;
}

// render
document.getElementById("list").innerHTML = DATA.map(cardItem).join("");

// click card = open layout
document.addEventListener("click",(e)=>{
  if(e.target.closest("button")) return;
  const item = e.target.closest(".item");
  if(!item) return;
  openModal(item.dataset.layout);
});

// modal
function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display = "flex";
}
function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("modalImg").src = "";
}
</script>
</body>
</html>
