<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ระบบระบุตำแหน่งงาน</title>

  <style>
    :root{
      /* ===== สีบริษัท ===== */
      --brand-red:#c1121f;
      --brand-red-dark:#9b0f18;
      --brand-blue:#1d4ed8;

      /* ===== สีระบบ ===== */
      --bg:#f8fafc;
      --card:#ffffff;
      --border:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Arial;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:14px}

    /* ===== Header ===== */
    .header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .logo-box{
      width:40px;
      height:40px;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo-box img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
      margin:auto;
      transform:translateY(-1px);
    }
    h1{font-size:18px;margin:0}
    .subtitle{font-size:13px;color:var(--muted)}

    /* ===== Card / Layout ===== */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin:12px 0;
    }
    .row{display:flex;gap:8px;flex-wrap:wrap}

    input,button{
      height:44px;
      border-radius:12px;
      padding:0 12px;
      font-size:15px;
    }
    input{
      flex:1;
      min-width:200px;
      border:1px solid var(--border);
      outline:none;
    }

    /* ===== Buttons ===== */
    button{
      background:var(--brand-red);
      color:#fff;
      border:none;
      cursor:pointer;
    }
    button:hover{background:var(--brand-red-dark)}
    button.secondary{
      background:#eef2ff;
      color:var(--brand-blue);
      border:1px solid #c7d2fe;
    }
    button:disabled{opacity:.5;cursor:not-allowed}

    .muted{font-size:13px;color:var(--muted);line-height:1.4}

    /* ===== Grid ===== */
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    }

    /* ===== STEP 3: Card แนวนอน ===== */
    .item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
      display:flex;
      gap:12px;
      align-items:flex-start;
      cursor:pointer;
    }
    .item:hover{background:#fafafa}

    .item .info{flex:1}

    .item .thumb{
      width:120px;
      min-width:120px;
    }
    .item .thumb img{
      width:100%;
      max-height:90px;
      object-fit:cover;
      border-radius:10px;
      margin:0;
    }

    .tag{
      display:inline-block;
      padding:2px 10px;
      border-radius:999px;
      background:#eef2ff;
      border:1px solid #c7d2fe;
      color:var(--brand-blue);
      font-size:12px;
      margin-right:6px;
    }
    .k{font-weight:600}

    /* ===== Mobile ===== */
    @media (max-width:640px){
      .grid{grid-template-columns:1fr}
      .item{align-items:center}
      .item .thumb{width:90px;min-width:90px}
      button{flex:1}
    }

    /* ===== STEP 3: Modal ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .modal-content{
      background:#fff;
      border-radius:14px;
      padding:10px;
      max-width:95vw;
      max-height:95vh;
    }
    .modal-content img{
      width:100%;
      max-height:90vh;
      object-fit:contain;
      border-radius:10px;
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- ===== Header ===== -->
  <div class="header">
    <div class="logo-box">
      <img src="assets/logo.png" alt="Company Logo">
    </div>
    <div>
      <h1 id="appTitle"></h1>
      <div class="subtitle" id="appSubtitle"></div>
    </div>
  </div>

  <!-- ===== Search ===== -->
  <div class="card">
    <div class="row">
      <input id="q">
      <button id="btnSearch"></button>
    </div>
    <div class="row" style="margin-top:10px">
      <input id="loc">
      <button class="secondary" id="btnLoc"></button>
      <input id="cus">
      <button class="secondary" id="btnCus"></button>
    </div>
  </div>

  <div id="status" class="muted"></div>
  <div id="out" class="card" style="display:none"></div>

  <!-- ===== List ===== -->
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <b id="allItemsTitle"></b>
      <button id="btnMore" class="secondary"></button>
    </div>
    <div id="list" class="grid" style="margin-top:10px"></div>
  </div>

</div>

<!-- ===== Modal ===== -->
<div id="layoutModal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImage" src="">
  </div>
</div>

<script>
/* ===== STEP 2: WORDS ===== */
const WORDS = {
  appTitle:"ระบบระบุตำแหน่งงาน",
  subtitle:"ค้นหาตำแหน่งจัดเก็บ • ชื่องาน • ลูกค้า",
  placeholderSearch:"ค้นหาชื่องาน / ตำแหน่งจัดเก็บ / ลูกค้า",
  placeholderLocation:"ตำแหน่งจัดเก็บ (เช่น A1-01)",
  placeholderCustomer:"รหัสลูกค้า",
  btnSearch:"ค้นหา",
  btnLocation:"ดูตำแหน่งจัดเก็บ",
  btnCustomer:"ดูลูกค้า",
  btnMore:"แสดงเพิ่มเติม",
  labelLocation:"ตำแหน่งจัดเก็บ",
  labelCustomer:"ลูกค้า",
  labelPart:"ชื่องาน",
  allItems:"รายการทั้งหมด",
  loading:"กำลังโหลดข้อมูล...",
  notFound:"ไม่พบข้อมูล"
};

function applyWords(){
  appTitle.textContent = WORDS.appTitle;
  appSubtitle.textContent = WORDS.subtitle;
  q.placeholder = WORDS.placeholderSearch;
  loc.placeholder = WORDS.placeholderLocation;
  cus.placeholder = WORDS.placeholderCustomer;
  btnSearch.textContent = WORDS.btnSearch;
  btnLoc.textContent = WORDS.btnLocation;
  btnCus.textContent = WORDS.btnCustomer;
  btnMore.textContent = WORDS.btnMore;
  allItemsTitle.textContent = WORDS.allItems;
}

const API_BASE="https://script.google.com/macros/s/AKfycbyh1nb5-K1oI5Sa9qeaVirBfj_ent1OW0j8Mzpvyk_JOFQKWWwyut2A_GWykkTA8fsBvA/exec";

const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
let offset=0, limit=50;

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    const script=document.createElement("script");
    window[cb]=(d)=>{delete window[cb];script.remove();resolve(d);}
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    script.onerror=()=>reject();
    document.body.appendChild(script);
  });
}

function cardItem(it){
  return `
    <div class="item" onclick="openModal('${esc(it.layout_image_url||"")}')">
      <div class="info">
        <div><span class="tag">${WORDS.labelLocation}</span><span class="k">${esc(it.location_code)}</span></div>
        <div><span class="tag">${WORDS.labelCustomer}</span>${esc(it.customer_code)}</div>
        <div><span class="tag">${WORDS.labelPart}</span>${esc(it.part_name)}</div>
      </div>
      ${it.layout_image_url?`
      <div class="thumb">
        <img src="${esc(it.layout_image_url)}">
      </div>`:""}
    </div>`;
}

function openModal(src){
  if(!src) return;
  modalImage.src=src;
  layoutModal.style.display="flex";
}
function closeModal(){
  layoutModal.style.display="none";
  modalImage.src="";
}

async function loadMore(){
  status.textContent=WORDS.loading;
  const d=await jsonp(`${API_BASE}?action=list&limit=${limit}&offset=${offset}`);
  offset+=d.returned;
  list.insertAdjacentHTML("beforeend",(d.items||[]).map(cardItem).join(""));
  if(d.returned<limit) btnMore.disabled=true;
  status.textContent="";
}

btnMore.onclick=loadMore;
applyWords();
loadMore();
</script>
</body>
</html>
