<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
:root{
  --brand-red:#c1121f;
  --brand-red-dark:#9b0f18;
  --brand-blue:#1d4ed8;
  --bg:#f8fafc;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.wrap{max-width:1100px;margin:auto;padding:14px}
.card{background:#fff;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}

/* search */
.row{display:flex;gap:8px;flex-wrap:wrap}
input,button{height:44px;border-radius:12px;padding:0 12px;font-size:15px}
input{flex:1;border:1px solid var(--border)}
button{background:var(--brand-red);color:#fff;border:none;cursor:pointer}
button:hover{background:var(--brand-red-dark)}

/* card */
.item{border:1px solid var(--border);border-radius:18px;overflow:hidden;background:#fff}
.item-body{display:flex;gap:14px;padding:14px}
.info{flex:1}
.layout{width:180px}
.layout img{width:100%;height:150px;object-fit:cover;border-radius:12px;cursor:pointer}

.tag{display:inline-block;background:#eef2ff;border-radius:999px;padding:2px 10px;font-size:12px;margin-right:6px}
.k{font-weight:700}

/* wi bar */
.wi-bar{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:#fafafa}
.wi-bar button{flex:1;height:40px;border:none;border-radius:10px;background:var(--brand-red);color:#fff}
.wi-bar button.secondary{background:#eef2ff;color:var(--brand-blue)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modal img{max-width:95vw;max-height:90vh}
</style>
</head>

<body>
<div class="wrap">

<!-- SEARCH -->
<div class="card">
  <div class="row">
    <input id="q" placeholder="ค้นหางาน / ลูกค้า / ตำแหน่ง">
    <button onclick="doSearch()">ค้นหา</button>
    <button onclick="loadList()">ทั้งหมด</button>
  </div>
</div>

<!-- RESULT -->
<div class="card">
  <b>รายการงาน</b>
  <div id="list" class="grid" style="margin-top:12px"></div>
</div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
const API_BASE =
"https://script.google.com/macros/s/AKfycbyJwO_mlyCF3ZOT_N2GPcLzUYX1vDOPNPsZAPwKz9mFbUEA4TpaDR4m3uTi362mwfqJMA/exec";

function jsonp(url){
  return new Promise(res=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];s.remove();res(d)};
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.body.appendChild(s);
  });
}

function clean(v){ return v && v!=="#N/A" ? v : ""; }

function card(it){
  return `
  <div class="item">
    <div class="item-body">
      <div class="info">
        <div><span class="tag">ตำแหน่ง</span><span class="k">${it.location_code}</span></div>
        <div><span class="tag">ลูกค้า</span>${it.customer_code}</div>
        <div><span class="tag">งาน</span>${it.part_name}</div>
      </div>
      <div class="layout">
        ${clean(it.layout_image_url)?`<img src="${it.layout_image_url}" onclick="openModal('${it.layout_image_url}')">`:``}
      </div>
    </div>
    <div class="wi-bar">
      ${clean(it.wi_front_url)?`<button onclick="openModal('${it.wi_front_url}')">WI หน้าเครื่อง</button>`:``}
      ${clean(it.wi_back_url)?`<button onclick="openModal('${it.wi_back_url}')">WI หลังเครื่อง</button>`:``}
      ${clean(it.label_image_url)?`<button class="secondary" onclick="openModal('${it.label_image_url}')">สติ๊กเกอร์</button>`:``}
    </div>
  </div>`;
}

async function loadList(){
  const r = await jsonp(API_BASE+"?action=list&limit=100");
  document.getElementById("list").innerHTML = r.items.map(card).join("");
}

async function doSearch(){
  const q = document.getElementById("q").value.trim();
  if(!q) return loadList();
  const r = await jsonp(API_BASE+"?action=search&q="+encodeURIComponent(q));
  document.getElementById("list").innerHTML = r.results.map(card).join("");
}

function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display="flex";
}

loadList();
</script>
</body>
</html>
