<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ค้นหาตำแหน่งงาน</title>

<style>
:root{
  --red:#c1121f;
  --blue:#1d4ed8;
  --green:#16a34a;
  --gray:#6b7280;
  --bg:#f8fafc;
  --border:#e5e7eb;
}

*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg)}
.wrap{max-width:1100px;margin:auto;padding:14px}

/* ---------- Header / Search ---------- */
.header{
  background:#fff;border-radius:16px;padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px
}
.row{display:flex;gap:8px;flex-wrap:wrap}
input,button{height:44px;border-radius:12px;padding:0 12px;font-size:15px}
input{flex:1;border:1px solid var(--border)}
button.primary{background:var(--red);color:#fff;border:none}
button.secondary{background:#eef2ff;color:var(--blue);border:none}

/* ---------- Grid ---------- */
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}

/* ---------- Card ---------- */
.item{
  background:#fff;border:1px solid var(--border);border-radius:18px;
  overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.06)
}
.item-body{display:flex;gap:12px;padding:14px}
.info{flex:1}

/* badges */
.badge{
  display:inline-block;padding:2px 10px;border-radius:999px;
  font-size:12px;margin-right:6px;background:#eef2ff;color:var(--blue)
}
.badge.ok{background:#dcfce7;color:var(--green)}
.badge.warn{background:#fee2e2;color:var(--red)}

.field{margin:4px 0;font-size:14px}
.missing{color:var(--red);font-weight:600}

/* layout */
.layout{width:170px}
.layout img{
  width:100%;height:140px;object-fit:cover;border-radius:12px;cursor:pointer
}

/* ---------- WI BAR ---------- */
.wi-bar{
  display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);
  background:#fafafa
}
.wi-bar button{
  flex:1;height:40px;border-radius:10px;border:none;font-size:14px
}
.wi-bar button.on{background:var(--red);color:#fff}
.wi-bar button.off{background:#e5e7eb;color:#6b7280}

/* ---------- Modal ---------- */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
  align-items:center;justify-content:center}
.modal img{max-width:95vw;max-height:90vh}

/* ---------- Mobile ---------- */
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .item-body{flex-direction:column-reverse}
  .layout{width:100%}
  .layout img{height:180px}
  .wi-bar{flex-direction:column}
  .wi-bar button{width:100%}
}
</style>
</head>

<body>
<div class="wrap">

<!-- SEARCH -->
<div class="header">
  <div class="row">
    <input id="q" placeholder="ค้นหางาน / ลูกค้า / ตำแหน่ง">
    <button class="primary" onclick="doSearch()">ค้นหา</button>
    <button class="secondary" onclick="loadList()">แสดงทั้งหมด</button>
  </div>
</div>

<!-- RESULT -->
<div class="grid" id="list"></div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
const API_BASE="https://script.google.com/macros/s/AKfycbyJwO_mlyCF3ZOT_N2GPcLzUYX1vDOPNPsZAPwKz9mFbUEA4TpaDR4m3uTi362mwfqJMA/exec";

function jsonp(url){
  return new Promise(res=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];s.remove();res(d)};
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.body.appendChild(s);
  });
}
const ok=v=>v && v!=="#N/A";

function card(it){
  const hasWI = ok(it.wi_front_url)||ok(it.wi_back_url)||ok(it.label_image_url);
  return `
  <div class="item">
    <div class="item-body">
      <div class="info">
        <div class="field">
          <span class="badge">${it.location_code}</span>
          <span class="badge ${hasWI?'ok':'warn'}">
            ${hasWI?'ข้อมูลพร้อม':'ยังไม่ครบ WI'}
          </span>
        </div>
        <div class="field">ลูกค้า: <b>${it.customer_code}</b></div>
        <div class="field">งาน: <b>${it.part_name}</b></div>
        <div class="field">แพ็ค: ${ok(it.packing_type)?it.packing_type:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
        <div class="field">สติ๊กเกอร์: ${ok(it.label_color)?it.label_color:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
      </div>
      <div class="layout">
        ${ok(it.layout_image_url)?`<img src="${it.layout_image_url}" onclick="openModal('${it.layout_image_url}')">`:``}
      </div>
    </div>
    <div class="wi-bar">
      <button class="${ok(it.wi_front_url)?'on':'off'}" onclick="${ok(it.wi_front_url)?`openModal('${it.wi_front_url}')`:''}">
        WI หน้า
      </button>
      <button class="${ok(it.wi_back_url)?'on':'off'}" onclick="${ok(it.wi_back_url)?`openModal('${it.wi_back_url}')`:''}">
        WI หลัง
      </button>
      <button class="${ok(it.label_image_url)?'on':'off'}" onclick="${ok(it.label_image_url)?`openModal('${it.label_image_url}')`:''}">
        สติ๊กเกอร์
      </button>
    </div>
  </div>`;
}

async function loadList(){
  const r=await jsonp(API_BASE+"?action=list&limit=100");
  document.getElementById("list").innerHTML=r.items.map(card).join("");
}
async function doSearch(){
  const q=document.getElementById("q").value.trim();
  if(!q) return loadList();
  const r=await jsonp(API_BASE+"?action=search&q="+encodeURIComponent(q));
  document.getElementById("list").innerHTML=r.results.map(card).join("");
}
function openModal(src){
  document.getElementById("modalImg").src=src;
  document.getElementById("modal").style.display="flex";
}
loadList();
</script>
</body>
</html>
