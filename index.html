<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TEST API</title>
</head>
<body>

<h2>ทดสอบเรียก Google Script</h2>
<div id="out">กำลังโหลด...</div>

<script>
const API_BASE = "https://script.google.com/macros/s/XXXXXXXX/exec";

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];script.remove();resolve(d);}
    const script=document.createElement("script");
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    script.onerror=()=>reject("load fail");
    document.body.appendChild(script);
  });
}

async function load(){
  try{
    const res = await jsonp(API_BASE+"?action=list");
    if(!res.ok){
      document.getElementById("out").innerText="API ไม่ส่ง ok:true";
      return;
    }
    document.getElementById("out").innerHTML =
      res.items.map(i=>`<div>${i.part_name}</div>`).join("");
  }catch(e){
    document.getElementById("out").innerText="เรียก API ไม่ได้";
  }
}
load();
</script>

</body>
</html>
