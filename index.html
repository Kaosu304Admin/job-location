<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0}
.wrap{max-width:1100px;margin:auto;padding:14px}
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}
.item{border:1px solid #e5e7eb;border-radius:16px;overflow:hidden}
.item-body{display:flex;gap:12px;padding:12px}
.info{flex:1}
.layout{width:180px}
.layout img{width:100%;height:140px;object-fit:cover;border-radius:12px;cursor:pointer}
.tag{background:#eef2ff;border-radius:999px;padding:2px 10px;font-size:12px;margin-right:6px}
.wi-bar{display:flex;gap:8px;padding:10px;border-top:1px solid #e5e7eb;background:#fafafa}
.wi-bar button{flex:1;height:40px;border:none;border-radius:10px;background:#c1121f;color:#fff}
.wi-bar button.secondary{background:#eef2ff;color:#1d4ed8}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modal img{max-width:95vw;max-height:90vh}
</style>
</head>

<body>
<div class="wrap">
  <h3>รายการงาน</h3>
  <div id="list" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<script>
const API_BASE =
"https://script.google.com/macros/s/AKfycbyJwO_mlyCF3ZOT_N2GPcLzUYX1vDOPNPsZAPwKz9mFbUEA4TpaDR4m3uTi362mwfqJMA/exec";

function jsonp(url){
  return new Promise(res=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];s.remove();res(d)};
    const s=document.createElement("script");
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.body.appendChild(s);
  });
}

function clean(v){
  return v && v !== "#N/A" ? v : "";
}

function card(it){
  return `
  <div class="item">
    <div class="item-body">
      <div class="info">
        <div><span class="tag">ตำแหน่ง</span>${it.location_code}</div>
        <div><span class="tag">ลูกค้า</span>${it.customer_code}</div>
        <div><span class="tag">งาน</span>${it.part_name}</div>
      </div>
      <div class="layout">
        ${clean(it.layout_image_url)?`<img src="${it.layout_image_url}" onclick="openModal('${it.layout_image_url}')">`:``}
      </div>
    </div>
    <div class="wi-bar">
      ${clean(it.wi_front_url)?`<button onclick="openModal('${it.wi_front_url}')">WI หน้าเครื่อง</button>`:``}
      ${clean(it.wi_back_url)?`<button onclick="openModal('${it.wi_back_url}')">WI หลังเครื่อง</button>`:``}
      ${clean(it.label_image_url)?`<button class="secondary" onclick="openModal('${it.label_image_url}')">สติ๊กเกอร์</button>`:``}
    </div>
  </div>`;
}

async function load(){
  const r = await jsonp(API_BASE+"?action=list&limit=100");
  document.getElementById("list").innerHTML = r.items.map(card).join("");
}
load();

function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display="flex";
}
</script>
</body>
</html>
