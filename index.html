<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ระบบค้นหาตำแหน่งงาน</title>

<style>
:root{
  --brand:#c1121f;
  --brandDark:#9b0f18;
  --blue:#1d4ed8;
  --green:#16a34a;
  --amber:#b45309;
  --gray:#6b7280;
  --bg:#f6f8fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#0f172a;
  --shadow: 0 16px 45px rgba(15,23,42,.10);
  --shadowHover: 0 26px 70px rgba(15,23,42,.16);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:radial-gradient(1200px 600px at 10% 0%, rgba(193,18,31,.10), transparent 60%),
             radial-gradient(800px 500px at 100% 0%, rgba(29,78,216,.08), transparent 60%),
             var(--bg);
  color:var(--text);
}
.wrap{max-width:1200px;margin:0 auto;padding:16px}

/* ===== Header ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin-bottom:14px;
}
.brand{
  display:flex;align-items:center;gap:12px;
}
.logo{
  width:44px;height:44px;border-radius:12px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.10);
  overflow:hidden;
}
.logo img{max-width:80%;max-height:80%;display:block}
.title{
  display:flex;flex-direction:column;gap:2px;
}
.title b{font-size:18px}
.title span{font-size:12px;color:var(--gray)}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  background:#fff;border:1px solid var(--border);
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  font-size:12px;color:var(--gray);
}

/* ===== Cards ===== */
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}

/* ===== Search row ===== */
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,button{
  height:46px;border-radius:12px;
  padding:0 14px;font-size:15px;
}
input{
  flex:1;min-width:220px;
  border:1px solid var(--border);
  outline:none;
}
input:focus{
  border-color:rgba(193,18,31,.35);
  box-shadow:0 0 0 3px rgba(193,18,31,.12);
}
button{
  border:none;cursor:pointer;
  transition:.15s ease;
}
button.primary{background:var(--brand);color:#fff}
button.primary:hover{background:var(--brandDark)}
button.secondary{background:#eef2ff;color:var(--blue)}
button.ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
button:disabled{opacity:.55;cursor:not-allowed}

/* ===== Summary ===== */
.summary{
  display:grid;gap:10px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  margin-top:10px;
}
.stat{
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  background:linear-gradient(180deg,#fff, #fbfbfc);
}
.stat .k{font-size:12px;color:var(--gray)}
.stat .v{font-size:22px;font-weight:800;margin-top:2px}
.badge{
  display:inline-block;padding:2px 10px;border-radius:999px;
  font-size:12px;border:1px solid transparent;
}
.badge.ok{background:#dcfce7;color:var(--green);border-color:#bbf7d0}
.badge.warn{background:#ffedd5;color:var(--amber);border-color:#fed7aa}
.badge.all{background:#eef2ff;color:var(--blue);border-color:#c7d2fe}

/* ===== Filter buttons ===== */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.filters button{
  height:38px;padding:0 12px;border-radius:999px;font-size:13px;
}
.filters button.active{
  outline:3px solid rgba(193,18,31,.14);
  border:1px solid rgba(193,18,31,.25);
}

/* ===== Grid ===== */
.grid{
  display:grid;gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  margin-top:12px;
}

/* ===== Item card ===== */
.item{
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.06);
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
}
.item:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadowHover);
}
.item.active{
  border-color:rgba(193,18,31,.55);
  box-shadow:0 26px 75px rgba(193,18,31,.22);
}
.item-body{
  display:flex;gap:14px;padding:16px;align-items:flex-start;
}
.info{flex:1;display:flex;flex-direction:column;gap:8px}
.line{font-size:14px}
.tag{
  display:inline-block;
  padding:2px 10px;border-radius:999px;
  background:#eef2ff;border:1px solid #c7d2fe;color:var(--blue);
  font-size:12px;margin-right:6px;
}
.missing{color:var(--amber);font-weight:700}
.layout{
  width:180px;min-width:180px;
}
.layout img{
  width:100%;height:150px;border-radius:14px;
  object-fit:cover;cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

/* ===== WI bar ===== */
.wi-bar{
  display:flex;gap:10px;
  padding:12px;border-top:1px solid var(--border);
  background:#fafafa;
}
.wi-bar button{
  flex:1;height:42px;border-radius:12px;font-size:14px;
}
.wi-on{background:var(--brand);color:#fff}
.wi-on:hover{background:var(--brandDark)}
.wi-off{background:#e5e7eb;color:#6b7280}

/* ===== Footer controls ===== */
.footerbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-top:12px;flex-wrap:wrap;
}
.small{font-size:12px;color:var(--gray)}

/* ===== Modal ===== */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;border-radius:16px;padding:10px;
  max-width:95vw;max-height:95vh;
}
.modal-content img{
  width:100%;max-height:90vh;object-fit:contain;display:block;
}

/* ===== Mobile ===== */
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .item-body{flex-direction:column-reverse}
  .layout{width:100%;min-width:unset}
  .layout img{height:190px}
  .wi-bar{flex-direction:column}
  .filters{justify-content:flex-start}
  input{min-width:160px}
  .footerbar{flex-direction:column;align-items:stretch}
}
</style>
</head>

<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="assets/logo.png" alt="logo">
      </div>
      <div class="title">
        <b>ระบบค้นหาตำแหน่งงาน</b>
        <span>ค้นหา • ดูผัง • ดู WI • สรุปสถานะ</span>
      </div>
    </div>
    <div class="pill" id="statusPill">พร้อมใช้งาน</div>
  </div>

  <!-- SEARCH -->
  <div class="panel">
    <div class="row">
      <input id="q" placeholder="ค้นหางาน / ลูกค้า / ตำแหน่ง (เช่น A2-01, CL-066, F5111/5112)">
      <button class="primary" id="btnSearch">ค้นหา</button>
      <button class="secondary" id="btnAll">แสดงทั้งหมด</button>
    </div>

    <!-- SUMMARY -->
    <div class="summary" style="margin-top:12px">
      <div class="stat">
        <div class="k"><span class="badge all">ทั้งหมด</span></div>
        <div class="v" id="sumTotal">-</div>
      </div>
      <div class="stat">
        <div class="k"><span class="badge ok">WI ครบ</span></div>
        <div class="v" id="sumOk">-</div>
      </div>
      <div class="stat">
        <div class="k"><span class="badge warn">WI ยังไม่ครบ</span></div>
        <div class="v" id="sumMiss">-</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="ghost active" id="fAll">ทั้งหมด</button>
      <button class="ghost" id="fOk">WI ครบ</button>
      <button class="ghost" id="fMiss">WI ยังไม่ครบ</button>
    </div>

    <div class="footerbar">
      <div class="small" id="loadedInfo">กำลังโหลด...</div>
      <button class="primary" id="btnMore">แสดงเพิ่ม</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="panel">
    <div class="grid" id="list"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg" alt="preview">
  </div>
</div>

<script>
// ✅ API ของคุณ
const API_BASE = "https://script.google.com/macros/s/AKfycbyJwO_mlyCF3ZOT_N2GPcLzUYX1vDOPNPsZAPwKz9mFbUEA4TpaDR4m3uTi362mwfqJMA/exec";

// ===== JSONP helper
function jsonp(url){
  return new Promise((resolve, reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    window[cb] = data => { delete window[cb]; s.remove(); resolve(data); };
    const s = document.createElement("script");
    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    s.onerror = () => reject(new Error("JSONP load failed"));
    document.body.appendChild(s);
  });
}

// ===== Helpers
function ok(v){ return v && v !== "#N/A"; }
function showNA(v){ return ok(v) ? v : `<span class="missing">ยังไม่ได้ใส่</span>`; }
function normUrl(u){ return String(u || "").replace(/&amp;/g, "&").trim(); }

function hasWI(it){
  return ok(it.wi_front_url) || ok(it.wi_back_url) || ok(it.label_image_url);
}

// ===== State
let mode = "list";           // list | search
let filterMode = "all";      // all | ok | miss
let offset = 0;
const LIMIT = 200;           // Apps Script cap = 200
let totalEstimate = 0;
let loading = false;
let finished = false;

let loadedItems = [];        // items ที่โหลดมาแล้ว (list mode)
let currentItems = [];       // items ที่แสดงใน grid (หลัง filter)
let searchItems = [];        // results จาก search

// ===== UI refs
const el = {
  q: document.getElementById("q"),
  btnSearch: document.getElementById("btnSearch"),
  btnAll: document.getElementById("btnAll"),
  btnMore: document.getElementById("btnMore"),
  list: document.getElementById("list"),
  loadedInfo: document.getElementById("loadedInfo"),
  statusPill: document.getElementById("statusPill"),
  sumTotal: document.getElementById("sumTotal"),
  sumOk: document.getElementById("sumOk"),
  sumMiss: document.getElementById("sumMiss"),
  fAll: document.getElementById("fAll"),
  fOk: document.getElementById("fOk"),
  fMiss: document.getElementById("fMiss"),
  modal: document.getElementById("modal"),
  modalImg: document.getElementById("modalImg")
};

// ===== Card template
function cardItem(it){
  const wiStatus = hasWI(it)
    ? `<span class="badge ok">ข้อมูลพร้อม</span>`
    : `<span class="badge warn">ยังไม่ครบ WI</span>`;

  const layout = ok(it.layout_image_url) ? normUrl(it.layout_image_url) : "";
  const wiFront = ok(it.wi_front_url) ? normUrl(it.wi_front_url) : "";
  const wiBack  = ok(it.wi_back_url) ? normUrl(it.wi_back_url) : "";
  const sticker = ok(it.label_image_url) ? normUrl(it.label_image_url) : "";

  return `
  <div class="item" onclick="setActiveCard(this)">
    <div class="item-body">
      <div class="info">
        <div class="line">
          <span class="tag">${it.location_code || "-"}</span>
          ${wiStatus}
        </div>
        <div class="line">ลูกค้า: <b>${it.customer_code || "-"}</b></div>
        <div class="line">งาน: <b>${it.part_name || "-"}</b></div>
        <div class="line">แพ็ค: ${showNA(it.packing_type)}</div>
        <div class="line">สติ๊กเกอร์: ${showNA(it.label_color)}</div>
      </div>

      <div class="layout">
        ${layout ? `<img src="${layout}" alt="layout" onclick="event.stopPropagation(); openModal('${layout}')">` : ``}
      </div>
    </div>

    <div class="wi-bar">
      <button class="${wiFront ? "wi-on":"wi-off"}" ${wiFront ? `onclick="event.stopPropagation(); openModal('${wiFront}')"`:"disabled"}>
        WI หน้า
      </button>
      <button class="${wiBack ? "wi-on":"wi-off"}" ${wiBack ? `onclick="event.stopPropagation(); openModal('${wiBack}')"`:"disabled"}>
        WI หลัง
      </button>
      <button class="${sticker ? "wi-on":"wi-off"}" ${sticker ? `onclick="event.stopPropagation(); openModal('${sticker}')"`:"disabled"}>
        สติ๊กเกอร์
      </button>
    </div>
  </div>`;
}

// active card
window.setActiveCard = function(node){
  document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
  node.classList.add("active");
};

// modal
window.openModal = function(src){
  el.modalImg.src = src;
  el.modal.style.display = "flex";
};
window.closeModal = function(){
  el.modal.style.display = "none";
  el.modalImg.src = "";
};

// ===== Render with filter
function applyFilter(){
  const base = (mode === "search") ? searchItems : loadedItems;

  if(filterMode === "ok"){
    currentItems = base.filter(hasWI);
  } else if(filterMode === "miss"){
    currentItems = base.filter(it=>!hasWI(it));
  } else {
    currentItems = base;
  }

  el.list.innerHTML = currentItems.map(cardItem).join("");
  updateLoadedInfo();
}

function setFilter(btn){
  [el.fAll, el.fOk, el.fMiss].forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function updateLoadedInfo(){
  if(mode === "search"){
    el.loadedInfo.textContent = `ผลการค้นหา: ${searchItems.length} รายการ`;
    el.btnMore.style.display = "none";
    return;
  }

  const shown = loadedItems.length;
  const total = totalEstimate || shown;
  el.loadedInfo.textContent = `แสดงแล้ว ${shown} / ${total} รายการ`;
  el.btnMore.style.display = finished ? "none" : "inline-block";
}

// ===== Summary (ยอดรวมทั้งระบบ)
async function loadSummary(){
  try{
    const s = await jsonp(API_BASE + "?action=summary");
    if(!s.ok) return;
    el.sumTotal.textContent = s.total;
    el.sumOk.textContent = s.wi_ok;
    el.sumMiss.textContent = s.wi_missing;
  }catch(_){}
}

// ===== Pagination list
async function loadMore(){
  if(loading || finished || mode !== "list") return;
  loading = true;
  el.statusPill.textContent = "กำลังโหลดข้อมูล...";
  try{
    const r = await jsonp(API_BASE + `?action=list&limit=${LIMIT}&offset=${offset}`);
    if(!r.ok || !r.items) throw new Error("bad response");

    totalEstimate = r.total_estimate || totalEstimate;

    if(r.items.length === 0){
      finished = true;
    } else {
      loadedItems = loadedItems.concat(r.items);
      offset += r.items.length;
      if(r.items.length < LIMIT) finished = true;
    }
    applyFilter();
  }catch(e){
    el.statusPill.textContent = "โหลดไม่สำเร็จ";
  }finally{
    loading = false;
    el.statusPill.textContent = "พร้อมใช้งาน";
  }
}

// ===== List reset
async function loadList(){
  mode = "list";
  finished = false;
  loading = false;
  offset = 0;
  totalEstimate = 0;
  loadedItems = [];
  searchItems = [];
  el.q.value = "";
  el.btnMore.style.display = "inline-block";
  await loadMore();
}

// ===== Search
async function doSearch(){
  const q = el.q.value.trim();
  if(!q) return loadList();

  mode = "search";
  finished = true; // ไม่ใช้ load more
  el.statusPill.textContent = "กำลังค้นหา...";
  try{
    const r = await jsonp(API_BASE + "?action=search&q=" + encodeURIComponent(q));
    if(!r.ok) throw new Error("search failed");
    searchItems = r.results || [];
    applyFilter();
  }catch(e){
    el.list.innerHTML = `<div class="small">ค้นหาไม่สำเร็จ</div>`;
  }finally{
    el.statusPill.textContent = "พร้อมใช้งาน";
  }
}

// ===== Events
el.btnSearch.onclick = doSearch;
el.btnAll.onclick = loadList;
el.btnMore.onclick = loadMore;

el.fAll.onclick = ()=>{ filterMode="all"; setFilter(el.fAll); applyFilter(); };
el.fOk.onclick  = ()=>{ filterMode="ok";  setFilter(el.fOk);  applyFilter(); };
el.fMiss.onclick= ()=>{ filterMode="miss";setFilter(el.fMiss);applyFilter(); };

// Enter to search
el.q.addEventListener("keydown",(ev)=>{ if(ev.key==="Enter") doSearch(); });

// ===== Start
loadSummary();   // ยอดรวมทั้งระบบ
loadList();      // โหลดรายการทีละ 200
</script>
</body>
</html>
