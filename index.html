<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ระบบระบุตำแหน่งงาน</title>

  <style>
    :root{
      /* ===== สีบริษัท ===== */
      --brand-red:#c1121f;
      --brand-red-dark:#9b0f18;
      --brand-blue:#1d4ed8;

      /* ===== สีระบบ ===== */
      --bg:#f8fafc;
      --card:#ffffff;
      --border:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Arial;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:1100px;margin:0 auto;padding:14px}

    /* ===== Header ===== */
    .header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .logo-box{
      width:40px;
      height:40px;
      border-radius:10px;
      background:#fff;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
    }
 .logo-box img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
  margin:auto;
}
    h1{font-size:18px;margin:0}
    .subtitle{font-size:13px;color:var(--muted)}

    /* ===== Card / Layout ===== */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin:12px 0;
    }
    .row{display:flex;gap:8px;flex-wrap:wrap}

    input,button{
      height:44px;
      border-radius:12px;
      padding:0 12px;
      font-size:15px;
    }
    input{
      flex:1;
      min-width:200px;
      border:1px solid var(--border);
    }

    /* ===== ปุ่ม ===== */
    button{
      background:var(--brand-red);
      color:#fff;
      border:none;
      cursor:pointer;
    }
    button:hover{background:var(--brand-red-dark)}
    button.secondary{
      background:#eef2ff;
      color:var(--brand-blue);
      border:1px solid #c7d2fe;
    }

    .muted{font-size:13px;color:var(--muted)}

    /* ===== Grid ===== */
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
    }

    .item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .tag{
      display:inline-block;
      padding:2px 10px;
      border-radius:999px;
      background:#eef2ff;
      border:1px solid #c7d2fe;
      color:var(--brand-blue);
      font-size:12px;
      margin-right:6px;
    }

    .k{font-weight:600}
    img{width:100%;border-radius:12px;margin-top:8px}

    /* ===== Mobile ===== */
    @media (max-width:640px){
      .grid{grid-template-columns:1fr}
      img{max-height:180px;object-fit:cover}
      button{flex:1}
    }
  </style>
</head>


<div class="wrap">

  <!-- ===== Header ===== -->
  <div class="header">
    <div class="logo-box">
      <img src="assets/logo.png" alt="Company Logo">
    </div>
    <div>
      <h1>ระบบระบุตำแหน่งงาน</h1>
      <div class="subtitle">ค้นหาตำแหน่งจัดเก็บ • ชื่องาน • ลูกค้า</div>
    </div>
  </div>

  <!-- ===== Search ===== -->
  <div class="card">
    <div class="row">
      <input id="q" placeholder="ค้นหาชื่องาน / ตำแหน่งจัดเก็บ / ลูกค้า">
      <button id="btnSearch">ค้นหา</button>
    </div>
    <div class="row" style="margin-top:10px">
      <input id="loc" placeholder="ตำแหน่งจัดเก็บ (เช่น A1-01)">
      <button class="secondary" id="btnLoc">ดูตำแหน่ง</button>
      <input id="cus" placeholder="รหัสลูกค้า">
      <button class="secondary" id="btnCus">ดูลูกค้า</button>
    </div>
  </div>

  <div id="status" class="muted"></div>
  <div id="out" class="card" style="display:none"></div>

  <!-- ===== List ===== -->
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <b>รายการทั้งหมด</b>
      <button id="btnMore" class="secondary">แสดงเพิ่มเติม</button>
    </div>
    <div id="list" class="grid" style="margin-top:10px"></div>
  </div>

</div>

<script>
/* ===== JS เดิมของคุณ ใช้ต่อได้ ไม่พัง ===== */
const API_BASE = "https://script.google.com/macros/s/AKfycbyh1nb5-K1oI5Sa9qeaVirBfj_ent1OW0j8Mzpvyk_JOFQKWWwyut2A_GWykkTA8fsBvA/exec";

const statusEl=document.getElementById("status");
const out=document.getElementById("out");
const listEl=document.getElementById("list");

const esc=s=>String(s??"").replace(/[&<>\"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
let offset=0, limit=50;

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=(data)=>{delete window[cb];script.remove();resolve(data);}
    const script=document.createElement("script");
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    script.onerror=()=>reject();
    document.body.appendChild(script);
  });
}

function cardItem(it){
  return `
  <div class="item">
    <div><span class="tag">ตำแหน่ง</span><span class="k">${esc(it.location_code)}</span></div>
    <div><span class="tag">ลูกค้า</span>${esc(it.customer_code)}</div>
    <div><span class="tag">งาน</span>${esc(it.part_name)}</div>
    ${it.layout_image_url?`<img src="${esc(it.layout_image_url)}">`:""}
  </div>`;
}

async function loadMore(){
  const d=await jsonp(`${API_BASE}?action=list&limit=${limit}&offset=${offset}`);
  offset+=d.returned;
  listEl.insertAdjacentHTML("beforeend",d.items.map(cardItem).join(""));
}
document.getElementById("btnMore").onclick=loadMore;
loadMore();
</script>
</body>
</html>
