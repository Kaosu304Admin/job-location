<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0}
.wrap{max-width:1000px;margin:auto;padding:16px}

.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08)
}
.item{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px
}
.tag{font-size:12px;color:#555}
.k{font-weight:700}

.wi-actions{display:flex;gap:8px;margin-top:10px}
.wi-actions button{flex:1}
</style>
</head>

<body>
<div class="wrap">
  <h2>รายการงาน</h2>
  <div id="list"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyh1nb5-K1oI5Sa9qeaVirBfj_ent1OW0j8Mzpvyk_JOFQKWWwyut2A_GWykkTA8fsBvA/exec";

function openImg(url){
  window.open(url,"_blank");
}

function card(it){
  return `
    <div class="item">
      <div><span class="tag">ตำแหน่ง:</span> <span class="k">${it.location_code||""}</span></div>
      <div><span class="tag">งาน:</span> ${it.part_name||""}</div>
      <div><span class="tag">แพ็คกิ้ง:</span> ${it.packing_type||""}</div>
      <div><span class="tag">สีสติ๊กเกอร์:</span> ${it.label_color||""}</div>

      <div class="wi-actions">
        ${it.wi_front_url?`<button onclick="openImg('${it.wi_front_url}')">WI หน้าเครื่อง</button>`:""}
        ${it.wi_back_url?`<button onclick="openImg('${it.wi_back_url}')">WI หลังเครื่อง</button>`:""}
        ${it.label_image_url?`<button onclick="openImg('${it.label_image_url}')">สติ๊กเกอร์</button>`:""}
      </div>
    </div>
  `;
}

function load(){
  const cb="cb"+Math.random().toString(36).slice(2);
  window[cb]=res=>{
    document.getElementById("list").innerHTML =
      res.items.map(card).join("");
  };
  const s=document.createElement("script");
  s.src=`${API}?action=list&limit=20&callback=${cb}`;
  document.body.appendChild(s);
}

load();
</script>
</body>
</html>
