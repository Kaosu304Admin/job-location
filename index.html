<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบระบุตำแหน่งงาน</title>

<style>
:root{
  --brand-red:#c1121f;
  --brand-red-dark:#9b0f18;
  --brand-blue:#1d4ed8;
  --bg:#f8fafc;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1100px;margin:0 auto;padding:14px}

.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin:14px 0;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  gap:14px;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
}

/* ===== ITEM CARD ===== */
.item{
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  background:#fff;
  transition:.25s ease;
}
.item:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 45px rgba(0,0,0,.16);
}

.item-body{
  padding:14px;
}

.tag{
  display:inline-block;
  padding:2px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:var(--brand-blue);
  font-size:12px;
  margin-right:6px;
}
.k{font-weight:600}

/* ===== LAYOUT IMAGE ===== */
.layout-box{
  margin-top:10px;
}
.layout-box img{
  width:100%;
  max-height:160px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* ===== WI ACTION BAR ===== */
.wi-bar{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--border);
  background:#fafafa;
}
.wi-bar button{
  flex:1;
  height:42px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-size:14px;
  background:var(--brand-red);
  color:#fff;
}
.wi-bar button.secondary{
  background:#eef2ff;
  color:var(--brand-blue);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;
  border-radius:16px;
  padding:10px;
  max-width:95vw;
  max-height:95vh;
}
.modal-content img{
  width:100%;
  max-height:90vh;
  object-fit:contain;
  display:block;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <b>ทดสอบการ์ดงาน (Layout + WI แถบล่าง)</b>
  <div id="list" class="grid" style="margin-top:12px"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">
  </div>
</div>
