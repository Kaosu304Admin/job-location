<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบค้นหาตำแหน่งงาน</title>

<style>
:root{
  --brand:#c1121f;
  --brand-dark:#9b0f18;
  --blue:#1d4ed8;
  --green:#16a34a;
  --red:#dc2626;
  --bg:#f8fafc;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1200px;margin:auto;padding:16px}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{
  width:42px;height:42px;border-radius:10px;background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  overflow:hidden;
}
.logo img{max-width:80%;max-height:80%}
.title{font-size:20px;font-weight:800}

/* ===== SEARCH ===== */
.search-card{
  background:#fff;border-radius:18px;padding:14px;margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.row{display:flex;gap:8px;flex-wrap:wrap}
input,button{
  height:46px;border-radius:12px;padding:0 14px;font-size:15px;
}
input{flex:1;border:1px solid var(--border);outline:none}
input:focus{border-color:rgba(193,18,31,.35);box-shadow:0 0 0 3px rgba(193,18,31,.12)}
button.primary{background:var(--brand);color:#fff;border:none;cursor:pointer}
button.primary:hover{background:var(--brand-dark)}
button.secondary{background:#eef2ff;color:var(--blue);border:none;cursor:pointer}

/* ===== FILTER BAR (ปุ่มเล็ก + ตัวเลข) ===== */
.filter-bar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;
}
.filter-bar button{
  height:40px;padding:0 14px;border-radius:999px;font-size:14px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
.filter-bar button span{font-weight:800}
.filter-bar button.primary{background:var(--brand);color:#fff}
.filter-bar button.secondary{background:#eef2ff;color:var(--blue)}
.filter-bar button.active{background:var(--brand)!important;color:#fff!important}
.small-note{font-size:12px;color:var(--muted);margin-left:auto}

/* ===== GRID ===== */
.grid{
  display:grid;gap:18px;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
}

/* ===== CARD ===== */
.item{
  background:#fff;border-radius:20px;border:1px solid var(--border);
  overflow:hidden;cursor:pointer;
  transition:transform .25s ease, box-shadow .25s ease;
  position:relative;
}
.item:hover{transform:translateY(-6px);box-shadow:0 22px 55px rgba(0,0,0,.18)}
.item.active{border-color:var(--brand);box-shadow:0 26px 65px rgba(193,18,31,.35)}
.item::after{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none}
.item.active::after{box-shadow:0 0 0 2px rgba(193,18,31,.45),0 30px 80px rgba(193,18,31,.25)}
.item-body{display:flex;gap:14px;padding:16px}

/* ===== INFO ===== */
.info{flex:1}
.badge{
  display:inline-block;padding:3px 12px;border-radius:999px;font-size:12px;margin-right:6px;
  background:#eef2ff;color:var(--blue);
}
.badge.ok{background:#dcfce7;color:var(--green)}
.badge.warn{background:#fee2e2;color:var(--red)}
.field{margin:6px 0}
.missing{color:var(--red);font-weight:600}

/* ===== LAYOUT ===== */
.layout{width:180px}
.layout img{
  width:100%;height:150px;object-fit:cover;border-radius:14px;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
  cursor:pointer;
}

/* ===== WI BAR ===== */
.wi-bar{
  display:flex;gap:10px;padding:12px;border-top:1px solid var(--border);
  background:#fafafa;
}
.wi-bar button{
  flex:1;height:42px;border-radius:12px;border:none;font-size:14px;cursor:pointer;
}
.wi-bar button.on{background:var(--brand);color:#fff}
.wi-bar button.on:hover{background:var(--brand-dark)}
.wi-bar button.off{background:#e5e7eb;color:#6b7280;cursor:not-allowed}

/* ===== MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:9999;
}
.modal img{max-width:95vw;max-height:90vh;object-fit:contain}

/* ===== LOADING OVERLAY (โลโก้ + spinner เท่านั้น) ===== */
.loading-overlay{
  position:fixed;inset:0;background:rgba(255,255,255,.86);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:20000;
}
.loading-box{
  background:#fff;padding:28px 36px;border-radius:22px;text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.2);
  min-width:220px;
}
.loading-logo{
  width:70px;margin-bottom:14px;
  animation:logoBounce 1.3s ease-in-out infinite;
}
@keyframes logoBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.spinner{
  width:38px;height:38px;border:4px solid #e5e7eb;border-top:4px solid var(--brand);
  border-radius:50%;margin:10px auto;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== MOBILE ===== */
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .item-body{flex-direction:column-reverse}
  .layout{width:100%}
  .layout img{height:200px}
  .wi-bar{flex-direction:column}
  .small-note{margin-left:0;width:100%}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div class="logo">
      <img src="assets/logo.png" alt="Company Logo">
    </div>
    <div class="title">ระบบค้นหาตำแหน่งงาน</div>
  </div>

  <div class="search-card">
    <div class="row">
      <input id="q" placeholder="ค้นหางาน / ลูกค้า / ตำแหน่ง">
      <button class="primary" id="btnSearch">ค้นหา</button>
      <button class="secondary" id="btnShowAll">แสดงทั้งหมด</button>
    </div>
  </div>

  <div class="filter-bar">
    <button id="btnAll" class="primary active">ทั้งหมด (<span id="sumAll">0</span>)</button>
    <button id="btnOK" class="secondary">✅ WI ครบ (<span id="sumOK">0</span>)</button>
    <button id="btnNG" class="secondary">⚠️ WI ยังไม่ครบ (<span id="sumNG">0</span>)</button>
    <button id="btnReload" class="secondary">🔄 Reload</button>
    <div class="small-note" id="loadedNote">กำลังโหลด...</div>
  </div>

  <div id="list" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg" alt="preview">
</div>

<div id="loading" class="loading-overlay">
  <div class="loading-box">
    <img src="assets/logo.png" class="loading-logo" alt="logo">
    <div class="spinner"></div>
  </div>
</div>

<script>
const API_BASE="https://script.google.com/macros/s/AKfycbyJwO_mlyCF3ZOT_N2GPcLzUYX1vDOPNPsZAPwKz9mFbUEA4TpaDR4m3uTi362mwfqJMA/exec";
const LIMIT = 200;

let ALL_ITEMS = [];
let VIEW_ITEMS = [];
let FILTER_MODE = "all";
let offset = 0;
let finished = false;
let fetching = false;

const ok = v => v && v !== "#N/A";
const hasWI = it => ok(it.wi_front_url) || ok(it.wi_back_url) || ok(it.label_image_url);

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    window[cb]=d=>{delete window[cb];s.remove();resolve(d)};
    const s=document.createElement("script");
    s.onerror=()=>{delete window[cb];s.remove();reject(new Error("JSONP failed"))};
    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    document.body.appendChild(s);
  });
}

function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function openModal(src){
  modalImg.src = String(src||"").replace(/&amp;/g,"&");
  modal.style.display="flex";
}

function card(it){
  return `
  <div class="item" onclick="setActive(this)">
    <div class="item-body">
      <div class="info">
        <div class="field">
          <span class="badge">${it.location_code||""}</span>
          <span class="badge ${hasWI(it)?'ok':'warn'}">
            ${hasWI(it)?'ข้อมูลพร้อม':'ยังไม่ครบ WI'}
          </span>
        </div>
        <div class="field">ลูกค้า: <b>${it.customer_code||""}</b></div>
        <div class="field">งาน: <b>${it.part_name||""}</b></div>
        <div class="field">แพ็ค: ${ok(it.packing_type)?it.packing_type:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
        <div class="field">สติ๊กเกอร์: ${ok(it.label_color)?it.label_color:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
      </div>

      <div class="layout" onclick="event.stopPropagation()">
        ${ok(it.layout_image_url)?`<img src="${it.layout_image_url}" onclick="openModal('${it.layout_image_url}')">`:``}
      </div>
    </div>

    <div class="wi-bar" onclick="event.stopPropagation()">
      <button class="${ok(it.wi_front_url)?'on':'off'}" ${ok(it.wi_front_url)?`onclick="openModal('${it.wi_front_url}')"`:"disabled"}>WI หน้า</button>
      <button class="${ok(it.wi_back_url)?'on':'off'}" ${ok(it.wi_back_url)?`onclick="openModal('${it.wi_back_url}')"`:"disabled"}>WI หลัง</button>
      <button class="${ok(it.label_image_url)?'on':'off'}" ${ok(it.label_image_url)?`onclick="openModal('${it.label_image_url}')"`:"disabled"}>สติ๊กเกอร์</button>
    </div>
  </div>`;
}

function setActive(el){
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

function updateCounts(){
  sumAll.textContent = ALL_ITEMS.length;
  sumOK.textContent  = ALL_ITEMS.filter(hasWI).length;
  sumNG.textContent  = ALL_ITEMS.filter(i=>!hasWI(i)).length;
}

function applyFilter(){
  btnAll.classList.remove("active");
  btnOK.classList.remove("active");
  btnNG.classList.remove("active");

  let items = ALL_ITEMS;
  if(FILTER_MODE==="ok"){
    items = ALL_ITEMS.filter(hasWI);
    btnOK.classList.add("active");
  }else if(FILTER_MODE==="ng"){
    items = ALL_ITEMS.filter(i=>!hasWI(i));
    btnNG.classList.add("active");
  }else{
    btnAll.classList.add("active");
  }

  VIEW_ITEMS = items;
  list.innerHTML = VIEW_ITEMS.map(card).join("");
  loadedNote.textContent = `แสดง ${VIEW_ITEMS.length} รายการ (จากทั้งหมด ${ALL_ITEMS.length})`;
}

async function loadAllPages(){
  if(fetching) return;
  fetching = true;

  offset = 0;
  finished = false;
  ALL_ITEMS = [];
  list.innerHTML = "";
  loadedNote.textContent = "กำลังโหลด...";
  updateCounts();
  applyFilter();

  showLoading();
  try{
    while(!finished){
      const r = await jsonp(API_BASE + `?action=list&limit=${LIMIT}&offset=${offset}`);
      const items = r.items || [];
      ALL_ITEMS = ALL_ITEMS.concat(items);
      offset += items.length;
      if(items.length < LIMIT) finished = true;
      await new Promise(res=>setTimeout(res, 60));
    }
    updateCounts();
    applyFilter();
  } finally {
    hideLoading();
    fetching = false;
  }
}

async function doSearch(){
  const q = qEl.value.trim();
  if(!q) return loadAllPages();

  showLoading();
  try{
    const r = await jsonp(API_BASE + "?action=search&q=" + encodeURIComponent(q));
    ALL_ITEMS = r.results || [];
    FILTER_MODE = "all";
    updateCounts();
    applyFilter();
  } finally {
    hideLoading();
  }
}

function showAll(){
  qEl.value = "";
  FILTER_MODE="all";
  return loadAllPages();
}

function reloadData(){ return loadAllPages(); }

const qEl = document.getElementById("q");
btnSearch.onclick = doSearch;
btnShowAll.onclick = showAll;
btnReload.onclick = reloadData;

btnAll.onclick = ()=>{ FILTER_MODE="all"; applyFilter(); };
btnOK.onclick  = ()=>{ FILTER_MODE="ok";  applyFilter(); };
btnNG.onclick  = ()=>{ FILTER_MODE="ng";  applyFilter(); };

qEl.addEventListener("keydown",(e)=>{ if(e.key==="Enter") doSearch(); });

loadAllPages();
</script>
</body>
</html>
